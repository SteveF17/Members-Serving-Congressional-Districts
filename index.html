<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Electric Service Territories</title>

  <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.dataTables.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #f7f7f7;
    }

    h1 {
      margin-bottom: 6px;
    }

    p {
      color: #555;
      margin-bottom: 16px;
    }

    .filters {
      margin-bottom: 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 240px;
    }

    .filter-group label {
      font-size: 13px;
      color: #444;
      font-weight: 600;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: white;
      border-radius: 6px;
      margin-top: 22px;
    }

    button:hover {
      background: #f0f0f0;
    }

    table {
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }

    /* Make Choices fields look a little cleaner */
    .choices__inner {
      min-height: 42px;
      background: #fff;
    }

    .choices[data-type*="select-multiple"] .choices__button,
    .choices[data-type*="text"] .choices__button {
      border-left: 1px solid rgba(0,0,0,0.15);
    }
  </style>
</head>

<body>

<h1>Electric Service Territories in Congressional Districts</h1>
<p>Search, filter, and explore the data</p>

<div class="filters">
  <div class="filter-group">
    <label for="stateFilter">State</label>
    <select id="stateFilter" multiple></select>
  </div>

  <div class="filter-group">
    <label for="companyFilter">Company</label>
    <select id="companyFilter" multiple></select>
  </div>

  <div class="filter-group">
    <label for="affiliationFilter">Name_Part_Affiliation</label>
    <select id="affiliationFilter" multiple></select>
  </div>

  <div class="filter-group">
    <label for="districtFilter">District</label>
    <select id="districtFilter" multiple></select>
  </div>

  <div class="filter-group" style="min-width: auto;">
    <label>&nbsp;</label>
    <button id="clearFilters" type="button">Clear Filters</button>
  </div>
</div>

<table id="table" class="display"></table>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

<script>
const csvUrl = "https://raw.githubusercontent.com/SteveF17/Members-Serving-Congressional-Districts/main/20260617_Electric%20Service%20Territories%20in%20Congressional%20Districts.csv";

Papa.parse(csvUrl, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {

    const data = results.data;
    if (!data || !data.length) {
      console.error("No data loaded from CSV.");
      return;
    }

    const columns = Object.keys(data[0]).map(col => ({
      title: col,
      data: col
    }));

    const table = new DataTable('#table', {
      data: data,
      columns: columns,
      pageLength: 25,
      scrollX: true
    });

    const cols = Object.keys(data[0]);

    // Flexible column matching
    const stateCol = cols.find(c => c.toLowerCase().includes("state"));
    const districtCol = cols.find(c => c.toLowerCase() === "district") ||
                        cols.find(c => c.toLowerCase().includes("district"));
    const companyCol = cols.find(c => c.toLowerCase() === "company") ||
                       cols.find(c => c.toLowerCase().includes("company"));
    const affiliationCol = cols.find(c => c.toLowerCase() === "name_part_affiliation") ||
                           cols.find(c => c.toLowerCase().includes("name_part_affiliation"));

    function escapeRegex(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function populateFilter(id, colName) {
      const select = document.getElementById(id);
      if (!colName || !select) return;

      const values = [...new Set(
        data
          .map(row => row[colName])
          .filter(v => v !== null && v !== undefined && String(v).trim() !== "")
      )].sort((a, b) => String(a).localeCompare(String(b)));

      values.forEach(v => {
        const opt = document.createElement("option");
        opt.value = String(v);
        opt.textContent = String(v);
        select.appendChild(opt);
      });
    }

    function buildRegexFromSelections(selectId) {
      const select = document.getElementById(selectId);
      const selectedValues = Array.from(select.selectedOptions).map(opt => opt.value);

      if (!selectedValues.length) return "";

      const escaped = selectedValues.map(v => escapeRegex(v));
      return "^(" + escaped.join("|") + ")$";
    }

    function applyMultiFilter(selectId, colName) {
      if (!colName) return;

      const select = document.getElementById(selectId);
      const colIndex = cols.indexOf(colName);

      if (colIndex === -1) return;

      select.addEventListener("change", function() {
        const regex = buildRegexFromSelections(selectId);
        table.column(colIndex).search(regex, true, false).draw();
      });
    }

    // Populate select options
    populateFilter("stateFilter", stateCol);
