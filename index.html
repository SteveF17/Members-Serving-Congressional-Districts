<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Electric Service Territories in Congressional Districts</title>

  <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.dataTables.css" />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #f7f7f7;
      color: #222;
    }

    h1 {
      margin-bottom: 6px;
    }

    p {
      color: #555;
      margin-bottom: 16px;
    }

    .filters {
      margin-bottom: 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: end;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filter-group label {
      font-size: 14px;
      font-weight: 600;
    }

    select {
      padding: 8px 10px;
      min-width: 240px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: white;
    }

    .table-wrap {
      background: white;
      padding: 16px;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    table {
      width: 100%;
    }

    .top-actions {
      margin-bottom: 12px;
    }

    button {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: white;
      cursor: pointer;
    }

    button:hover {
      background: #f0f0f0;
    }
  </style>
</head>

<body>

  <h1>Electric Service Territories in Congressional Districts</h1>
  <p>Search, sort, and filter the data by Company, Name_Part_Affiliation, and District.</p>

  <div class="filters">
    <div class="filter-group">
      <label for="companyFilter">Company</label>
      <select id="companyFilter">
        <option value="">All Companies</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="affiliationFilter">Name_Part_Affiliation</label>
      <select id="affiliationFilter">
        <option value="">All Affiliations</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="districtFilter">District</label>
      <select id="districtFilter">
        <option value="">All Districts</option>
      </select>
    </div>

    <div class="filter-group">
      <label>&nbsp;</label>
      <button id="clearFilters">Clear Filters</button>
    </div>
  </div>

  <div class="table-wrap">
    <table id="table" class="display"></table>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/2.0.8/js/dataTables.js"></script>
