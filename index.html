<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Electric Service Territories</title>

  <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.dataTables.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #f7f7f7;
    }
    h1 {
      margin-bottom: 6px;
    }
    p {
      color: #555;
      margin-bottom: 16px;
    }
    .filters {
      margin-bottom: 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .filter-group label {
      font-size: 13px;
      color: #444;
      font-weight: 600;
    }
    select {
      padding: 6px;
      min-width: 220px;
    }
    button {
      padding: 7px 12px;
      cursor: pointer;
    }
    table {
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }
    .note {
      font-size: 12px;
      color: #666;
      margin-top: -6px;
      margin-bottom: 16px;
    }
  </style>
</head>

<body>

<h1>Electric Service Territories in Congressional Districts</h1>
<p>Search, filter, and explore the data</p>
<div class="note">Tip: hold Ctrl (Windows) or Cmd (Mac) to select multiple items.</div>

<div class="filters">
  <div class="filter-group">
    <label for="stateFilter">State</label>
    <select id="stateFilter" multiple size="6"></select>
  </div>

  <div class="filter-group">
    <label for="companyFilter">Company</label>
    <select id="companyFilter" multiple size="6"></select>
  </div>

  <div class="filter-group">
    <label for="affiliationFilter">Name_Part_Affiliation</label>
    <select id="affiliationFilter" multiple size="6"></select>
  </div>

  <div class="filter-group">
    <label for="districtFilter">District</label>
    <select id="districtFilter" multiple size="6"></select>
  </div>

  <div class="filter-group">
    <label>&nbsp;</label>
    <button id="clearFilters" type="button">Clear Filters</button>
  </div>
</div>

<table id="table" class="display"></table>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
const csvUrl = "https://raw.githubusercontent.com/SteveF17/Members-Serving-Congressional-Districts/main/20260617_Electric%20Service%20Territories%20in%20Congressional%20Districts.csv";

Papa.parse(csvUrl, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {

    const data = results.data;
    if (!data || !data.length) {
      console.error("No data loaded from CSV.");
      return;
    }

    const columns = Object.keys(data[0]).map(col => ({
      title: col,
      data: col
    }));

    const table = new DataTable('#table', {
      data: data,
      columns: columns,
      pageLength: 25,
      scrollX: true
    });

    const cols = Object.keys(data[0]);

    // Flexible column matching
    const stateCol = cols.find(c => c.toLowerCase().includes("state"));
    const districtCol = cols.find(c => c.toLowerCase() === "district") ||
                        cols.find(c => c.toLowerCase().includes("district"));
    const companyCol = cols.find(c => c.toLowerCase() === "company") ||
                       cols.find(c => c.toLowerCase().includes("company"));
    const affiliationCol = cols.find(c => c.toLowerCase() === "name_part_affiliation") ||
                           cols.find(c => c.toLowerCase().includes("name_part_affiliation"));

    function escapeRegex(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function populateFilter(id, colName) {
      if (!colName) return;

      const values = [...new Set(
        data
          .map(row => row[colName])
          .filter(v => v !== null && v !== undefined && String(v).trim() !== "")
      )].sort((a, b) => String(a).localeCompare(String(b)));

      const select = document.getElementById(id);

      values.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        select.appendChild(opt);
      });
    }

    function getSelectedValues(selectId) {
      const select = document.getElementById(selectId);
      return Array.from(select.selectedOptions).map(opt => opt.value);
    }

    function applyMultiFilter(selectId, colName) {
      if (!colName) return;

      const select = document.getElementById(selectId);
      const colIndex = cols.indexOf(colName);

      select.addEventListener("change", function() {
        const selectedValues = getSelectedValues(selectId);

        if (!selectedValues.length) {
          table.column(colIndex).search("", true, false).draw();
          return;
        }

        const regex = "^(" + selectedValues.map(v => escapeRegex(v)).join("|") + ")$";
        table.column(colIndex).search(regex, true, false).draw();
      });
    }

    // Populate dropdowns
    populateFilter("stateFilter", stateCol);
    populateFilter("companyFilter", companyCol);
    populateFilter("affiliationFilter", affiliationCol);
    populateFilter("districtFilter", districtCol);

    // Apply filters
    applyMultiFilter("stateFilter", stateCol);
    applyMultiFilter("companyFilter", companyCol);
    applyMultiFilter("affiliationFilter", affiliationCol);
    applyMultiFilter("districtFilter", districtCol);

    // Clear all filters
    document.getElementById("clearFilters").addEventListener("click", function() {
      ["stateFilter", "companyFilter", "affiliationFilter", "districtFilter"].forEach(id => {
        const select = document.getElementById(id);
        Array.from(select.options).forEach(opt => opt.selected = false);
      });

      table.columns().search("");
      table.search("");
      table.draw();
    });

    // Helpful console messages if a column is missing
    if (!stateCol) console.warn("State column not found.");
    if (!companyCol) console.warn("Company column not found.");
    if (!affiliationCol) console.warn("Name_Part_Affiliation column not found.");
    if (!districtCol) console.warn("District column not found.");
  }
});
</script>

</body>
</html>
